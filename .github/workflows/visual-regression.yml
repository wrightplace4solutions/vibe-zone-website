name: Visual Regression Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update baseline screenshots (commits new baselines)'
        type: boolean
        default: false

jobs:
  visual-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Build project
        run: npm run build

      - name: Run visual regression tests
        run: |
          if [ "${{ github.event.inputs.update_snapshots }}" = "true" ]; then
            npx playwright test --update-snapshots
          else
            npx playwright test
          fi

      - name: Upload screenshots (always, for review)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-${{ github.sha }}
          path: |
            tests/visual/__snapshots__/
            test-results/
          retention-days: 30

      - name: Commit updated baselines (update run only)
        if: github.event.inputs.update_snapshots == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual/__snapshots__/
          git diff --staged --quiet || git commit -m "chore(visual): update screenshot baselines [skip ci]"
          git push
